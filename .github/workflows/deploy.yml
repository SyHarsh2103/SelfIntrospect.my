name: Deploy Self Introspect to VPS

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      - name: Add VPS to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Rsync project to VPS
        run: |
          rsync -az --delete \
            --exclude ".git" \
            --exclude "backend/node_modules" \
            --exclude "frontend/node_modules" \
            --exclude "frontend/dist" \
            --exclude "backend/.env" \
            --exclude "frontend/.env" \
            --exclude "frontend/.env.production" \
            -e "ssh -p ${{ secrets.SSH_PORT }}" \
            ./ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/selfintrospect.my

      - name: Build and restart on VPS
        run: |
          ssh -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
          set -e

          APP_DIR="/var/www/self-introspect"
          FRONTEND_DEPLOY_DIR="/var/www/selfintrospect.my"
          APP_NAME="self-introspect-api"

          echo "Installing backend dependencies..."
          cd "$APP_DIR/backend"
          npm ci

          echo "Restarting backend..."
          pm2 describe "$APP_NAME" &>/dev/null && pm2 restart "$APP_NAME" || pm2 start server.js --name "$APP_NAME"
          pm2 save

          echo "Installing frontend dependencies..."
          cd "$APP_DIR/frontend"
          npm ci

          echo "Building frontend..."
          npm run build

          echo "Deploying frontend build..."
          mkdir -p "$/var/www/self-introspect-frontend"
          rm -rf "$/var/www/self-introspect-frontend"/*
          cp -r /var/www/SelfIntrospect.my/frontend/dist/* "$/var/www/self-introspect-frontend"/

          echo "Reloading nginx..."
          nginx -t
          systemctl reload nginx
          EOF