name: Deploy Self Introspect

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e

            cd /var/www/self-introspect

            git pull origin main

            cd backend
            npm install
            pm2 restart self-introspect-api || pm2 start server.js --name self-introspect-api

            cd ../frontend
            npm install
            npm run build

            rm -rf /var/www/self-introspect-frontend/*
            cp -r dist/* /var/www/self-introspect-frontend/

            pm2 save
            nginx -t
            systemctl reload nginx